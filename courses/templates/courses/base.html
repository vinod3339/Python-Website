{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course_code }} Course Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
  </head>
  <body>
    <div class="app-shell min-vh-100">
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
            <span class="logo-dot"></span>
            <span class="fw-semibold">Course Portal</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="navbar-nav ms-auto gap-lg-2">
              <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">Home</a>
              <a class="nav-link {% if request.path == '/slides/' %}active{% endif %}" href="{% url 'slides' %}">Slides</a>
              <a class="nav-link {% if request.path == '/assignments/' %}active{% endif %}" href="{% url 'assignments' %}">Assignments</a>
            </div>
          </div>
        </div>
      </nav>

      {% block content %}{% endblock %}

      <footer class="footer-section py-4 mt-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 text-secondary">
          <span>Semester: {{ semester }}</span>
          <span>Course: {{ course_code }} {{ course_name }}</span>
          <span>Last Updated: {{ last_updated }}</span>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
